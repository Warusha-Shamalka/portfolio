<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 2rem;
            width: min(100%, 540px);
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18);
        }
        
        h1 {
            font-size: clamp(2.25rem, 5vw, 3rem);
            margin-bottom: 1rem;
            font-weight: 700;
            line-height: 1.05;
        }
        
        p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            margin-bottom: 2rem;
            opacity: 0.95;
            max-width: 38rem;
            margin-left: auto;
            margin-right: auto;
        }
        
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 2rem;
            background-color: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            margin: 0.5rem;
            min-width: 160px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .profile-image {
            width: clamp(120px, 25vw, 160px);
            height: clamp(120px, 25vw, 160px);
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 5px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 1.75rem 1.25rem;
                border-radius: 1.5rem;
            }

            .button {
                width: 100%;
                min-width: 0;
                margin: 0.45rem 0;
            }

            .button + .button {
                margin-top: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Profile photo of Warusha Shamalka" class="profile-image" />
        <h1>Welcome to My Portfolio</h1>
        <p>Explore my work and projects</p>
        <a href="#portfolio" class="button">View Portfolio</a>
        <a href="https://github.com/Warusha-Shamalka" class="button">GitHub Profile</a>
    </div>
</body>
</html>
